name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17]
    name: Build (JDK ${{ matrix.java }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build with Maven (quickly)
        run: >
          mvn install
          -Dquickly
          -pl core,optaplanner-benchmark,optaplanner-test
          -am

      - name: Test core
        run: >
          mvn test
          -pl core
          -Dtest="org.optaplanner.core.api.score.buildin.hardsoft.HardSoftScoreTest"

      - name: Test optaplanner-benchmark
        run: >
          mvn test
          -pl optaplanner-benchmark
          -Dtest="org.optaplanner.benchmark.impl.DefaultPlannerBenchmarkFactoryTest"

      - name: Test optaplanner-test
        run: >
          mvn test
          -pl optaplanner-test